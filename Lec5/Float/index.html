<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            width: 900px;
           

            border: 2px solid black;
        }
        .child-1{
           float: right;
            width: 45%;
            height: 20%;
            border: 2px solid black;
            background: aqua;

        }
        .child-2{
            float: left;
            background-color: bisque;
            width: 45%;
            height: 20%;
            border: 2px solid black;
        }
        .fix{
            clear: both;
        }
    </style>
</head>
<body>
    

    <div class="parent">
        <div class="child-1">child-1</div>
        <div class="child-2">child-2</div>

        <div class="fix"></div>
    </div>
</body>
</html>
