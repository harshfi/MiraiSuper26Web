<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        .container{
            margin: 45px;
            border: 2px solid red;
            position: relative;
        }
        .main{
            border: 2px solid blue;
            position: relative;
        }
        p{
            width: 200px;
            border: 2px solid green;
            position: absolute;
            top:0px;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <h1>Hi hello kaise ho</h1>
        <div class="main">
             <h3>main thik hu </h3>
              <p>this is me harsh tripathi</p>
        </div>
    </div>
</body>
</html>
